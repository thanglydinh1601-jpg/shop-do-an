{% extends "base.html" %}
{% block title %}Đăng nhập — Shop Thắng{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <div style="font-size:3rem">🛍️</div>
        <h4 class="fw-bold mt-2">Đăng nhập</h4>
        <p class="text-muted small">Chào mừng quay lại Shop Thắng!</p>
      </div>
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-medium">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
          <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        Chưa có tài khoản? <a href="/register" class="text-decoration-none fw-medium">Đăng ký ngay</a>
      </p>
      <div class="mt-3 p-2 bg-light rounded text-muted" style="font-size:.8rem">
        <i class="bi bi-info-circle me-1"></i>
        Tài khoản mẫu: <code>admin/admin123</code> · <code>user1/user123</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
