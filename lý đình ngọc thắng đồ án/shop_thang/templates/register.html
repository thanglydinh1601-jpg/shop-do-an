{% extends "base.html" %}
{% block title %}Đăng ký — Shop Thắng{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <div style="font-size:3rem">✨</div>
        <h4 class="fw-bold mt-2">Tạo tài khoản</h4>
      </div>
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-medium">Họ và tên</label>
          <input type="text" name="fullname" class="form-control" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-medium">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="username" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-medium">Email</label>
          <input type="email" name="email" class="form-control" placeholder="email@example.com">
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Ít nhất 6 ký tự" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
          <i class="bi bi-person-plus me-1"></i>Đăng ký
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        Đã có tài khoản? <a href="/login" class="text-decoration-none fw-medium">Đăng nhập</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
