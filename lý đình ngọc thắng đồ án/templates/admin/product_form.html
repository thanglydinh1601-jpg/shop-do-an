{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Sửa' if product else 'Thêm' }} sản phẩm — Shop Thắng{% endblock %}

{% block admin_content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="/admin/products" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ 'Sửa sản phẩm' if product else 'Thêm sản phẩm mới' }}</h4>
</div>

<div class="card p-4" style="max-width:560px">
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-medium">Tên sản phẩm <span class="text-danger">*</span></label>
      <input type="text" name="name" class="form-control" value="{{ product['name'] if product else '' }}" required>
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label fw-medium">Danh mục</label>
        <select name="category" class="form-select">
          {% for cat in ['Điện tử','Thời trang','Gia dụng','Thực phẩm','Sách'] %}
            <option {{ 'selected' if product and product['category']==cat }}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col">
        <label class="form-label fw-medium">Icon (emoji)</label>
        <input type="text" name="icon" class="form-control" value="{{ product['icon'] if product else '📦' }}" maxlength="4">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label fw-medium">Giá (đ) <span class="text-danger">*</span></label>
        <input type="number" name="price" class="form-control" value="{{ product['price'] if product else '' }}" required min="0">
      </div>
      <div class="col">
        <label class="form-label fw-medium">Tồn kho</label>
        <input type="number" name="stock" class="form-control" value="{{ product['stock'] if product else 0 }}" min="0">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-medium">Mô tả</label>
      <textarea name="description" class="form-control" rows="3">{{ product['description'] if product else '' }}</textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-check-lg me-1"></i>{{ 'Cập nhật' if product else 'Thêm sản phẩm' }}
      </button>
      <a href="/admin/products" class="btn btn-outline-secondary">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
